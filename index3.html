<!DOCTYPE html>
<html lang="pt-BR">

    <title>Tabelas simples</title>
  </head>
  <body>
    <h2>Lista de alunos</h2>
    <table border="1">
      <tr>
        <th>Nome</th>
        <th>Idade</th>
        <th>Curso</th>
      </tr>
      <tr>
        <td>Yasmin</td>
        <td>22</td>
        <td>Direito</td>
      </tr>
      <tr>
        <td>Angelo</td>
        <td>29</td>
        <td>T.i.</td>
      </tr>

      <tr>
        <td>João</td>
        <td>22</td>
        <td>Designer</td>
      </tr>
    </table>
	
	<!-- Começamos os exercícios práticos que era para ser feito em casa, o primeiro é crie uma tabela HTML contendo: três colunas (Nome,idade,curso), crie três alunos fictícios e em seguida, um total  fictícios de alunos. --> 
   </tbody>
   <tfoot>
	<tr>
     <td colspan="2">Total de pessoas</td>
     <td>3</td>
	 <td rowspan=""></td>
	 <td></td>
    </tr>
   </tfoot>
  </table>
 </body>  
</html>
